name: Update macro dashboard

# Rebuilds index.html from live FRED data once a day, and on demand.
# No secrets needed: FRED's CSV endpoint is keyless, and GITHUB_TOKEN is automatic.

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (~19:00 Asia/Bangkok). Adjust if you like.
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

permissions:
  contents: write           # allow the job to commit the refreshed index.html

concurrency:
  group: macro-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard from live FRED data
        run: python scripts/build_dashboard.py --out index.html

      - name: Commit if the dashboard changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No change in dashboard data today."
          else
            git commit -m "auto: refresh macro dashboard ($(date -u +%Y-%m-%d))"
            git push
          fi
